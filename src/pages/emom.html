
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>EMOM Timer</title>
<style>
  :root{
    --bg:#0f1724; --card:#0b1220; --accent:#06b6d4; --muted:#94a3b8; --text:#e6eef6;
  }

  /* Use min-height so layout can grow and page can scroll on small screens.
     Align start so top of app remains visible (not centered vertically). */
  html,body{min-height:100vh;margin:0;font-family:Inter,Segoe UI,Roboto,system-ui,-apple-system,"Helvetica Neue",Arial;}
  body{
    background:linear-gradient(180deg,#071028 0%, #0b1220 60%);
    color:var(--text);
    display:flex;
    align-items:flex-start;       /* was center — causes top to be cut off on mobile */
    justify-content:center;
    padding:20px;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }

  /* Make the card scrollable if viewport is short (keyboard, small devices) */
  .wrap{
    width:100%;
    max-width:960px;
    background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);
    border-radius:12px;
    padding:16px;
    box-shadow:0 8px 30px rgba(2,6,23,0.7);
    border:1px solid rgba(255,255,255,0.03);
    max-height: calc(100vh - 40px); /* leave some room for viewport chrome */
    overflow:auto;                  /* allow scrolling inside card */
  }

  h1{margin:0 0 8px;font-size:20px;}
  .grid{display:grid;grid-template-columns:1fr 360px;gap:18px;}
  label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
  textarea{
    width:100%;
    min-height:160px;              /* reduced from 260 to be friendlier on mobile */
    max-height: calc(45vh);        /* keep textarea reasonable on short viewports */
    padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);
    background:#061124;color:var(--text);resize:vertical;font-size:14px;line-height:1.4;
    box-sizing:border-box;
  }
  .controls{background:linear-gradient(180deg,#071327,#06101a);padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column;gap:12px;}
  .row{display:flex;gap:8px;align-items:center;}
  input[type=number]{width:90px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:#071627;color:var(--text);font-size:14px}
  button{cursor:pointer;padding:10px 12px;border-radius:8px;border:0;background:var(--accent);color:#012;font-weight:600}
  button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.06);color:var(--text);font-weight:600}
  .display{display:flex;flex-direction:column;gap:8px;align-items:center;justify-content:center;padding:8px 6px;}
  .timer{font-size:64px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
  .exercise{font-size:20px;text-align:center;min-height:48px;padding:6px 10px;border-radius:8px;background:rgba(255,255,255,0.02);width:100%}
  .meta{font-size:14px;color:var(--muted)}
  .small{font-size:12px;color:var(--muted);text-align:center}
  .footer{margin-top:12px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .progress{height:8px;background:rgba(255,255,255,0.04);border-radius:999px;overflow:hidden;width:100%}
  .bar{height:100%;background:linear-gradient(90deg,var(--accent),#7dd3fc);width:0%}
  .hidden{display:none !important}

  /* Responsive tweaks */
  @media (max-width:860px){
    .grid{grid-template-columns:1fr;}
    .controls{order:2}
    .display{order:1}
  }

  @media (max-width:480px){
    body{padding:12px;}
    .wrap{padding:12px;}
    .timer{font-size:48px;}            /* reduce huge timer on small viewports */
    .grid{gap:12px;}
    textarea{min-height:120px; max-height:40vh;}
    .controls{padding:10px;}
  }

  /* Ensure focusable elements are visible when keyboard opens on mobile:
     the card is scrollable, so the focused textarea/input can be scrolled into view. */
  :focus{outline: none;}
  textarea:focus, input:focus, button:focus { box-shadow: 0 0 0 3px rgba(6,182,212,0.08); outline: none; }
</style>
</head>
<body>
  <div class="wrap" role="application" aria-label="EMOM timer">
    <h1>EMOM Timer</h1>
    <div class="grid">
      <div id="setupPanel">
        <label for="exercises">Exercises (one per line)</label>
        <textarea id="exercises" placeholder="e.g. Push-ups&#10;Air Squats&#10;Plank 60s"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
          <button id="pasteSample" class="secondary">Load sample</button>
          <button id="clear" class="secondary">Clear</button>
        </div>
  <!-- SAVE / LOAD -->
  <div style="display:flex;gap:8px;margin-top:10px;align-items:center">
    <input id="saveName" type="text" placeholder="Workout name" style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:#061124;color:var(--text)" />
    <button id="saveWorkout" class="secondary">Save</button>
  </div>
  <div style="display:flex;gap:8px;margin-top:8px;align-items:center">
    <select id="savedWorkouts" style="flex:1;padding:8px;border-radius:6px;border:1px solid rgba(255,255,255,0.04);background:#061124;color:var(--text)"></select>
    <button id="loadWorkout" class="secondary">Load</button>
    <button id="deleteWorkout" class="secondary">Delete</button>
  </div>
      </div>

      <div class="controls">
        <div id="setupInputs">
          <div class="row">
            <div style="flex:1">
              <label for="rounds">Rounds (full cycles through all exercises)</label>
              <input id="rounds" type="number" min="1" value="1" />
            </div>
            <div>
              <label for="duration">Minute length (seconds)</label>
              <input id="duration" type="number" min="5" value="60" style="width:100px" />
            </div>
          </div>
        </div>

        <div class="display">
          <div class="timer" id="timer">01:00</div>
          <div class="exercise" id="currentExercise">Ready</div>
          <div class="meta" id="roundDisplay">Round — of —</div>
          <div class="meta" id="exerciseDisplay">Exercise — of —</div>
          <div class="progress" aria-hidden="true" style="width:100%;max-width:320px">
            <div class="bar" id="progressBar"></div>
          </div>
          <div class="small" id="status">Stopped</div>
        </div>

        <div style="display:flex;gap:8px">
          <button id="start">Start</button>
          <button id="pause" class="secondary" disabled>Pause</button>
          <button id="reset" class="secondary" disabled>Reset</button>
        </div>

        <div class="footer">
          <div>Auto beep at minute end</div>
          <div style="opacity:0.9;font-size:12px">Total time: <span id="totalTime">0m</span></div>
        </div>
      </div>
    </div>
  </div>

<script>
(function(){
  // Elements
  const setupPanel = document.getElementById('setupPanel');
  const setupInputs = document.getElementById('setupInputs');
  const exercisesEl = document.getElementById('exercises');
  const roundsEl = document.getElementById('rounds');
  const durationEl = document.getElementById('duration');
  const startBtn = document.getElementById('start');
  const pauseBtn = document.getElementById('pause');
  const resetBtn = document.getElementById('reset');
  const timerEl = document.getElementById('timer');
  const currentExerciseEl = document.getElementById('currentExercise');
  const roundDisplayEl = document.getElementById('roundDisplay');
  const exerciseDisplayEl = document.getElementById('exerciseDisplay');
  const statusEl = document.getElementById('status');
  const progressBar = document.getElementById('progressBar');
  const totalTimeEl = document.getElementById('totalTime');
  const pasteSample = document.getElementById('pasteSample');
  const clearBtn = document.getElementById('clear');
  const saveNameEl = document.getElementById('saveName');
  const saveWorkoutBtn = document.getElementById('saveWorkout');
  const savedSelect = document.getElementById('savedWorkouts');
  const loadWorkoutBtn = document.getElementById('loadWorkout');
  const deleteWorkoutBtn = document.getElementById('deleteWorkout');

  // State
  let exercises = [];
  let rounds = 1;
  let minuteMs = 60000;
  let running = false;
  let paused = false;
  let intervalId = null;
  let endTime = 0;
  let remainingMsOnPause = 0;
  let audioCtx = null;
  let totalMinutes = 0;
  let minutesElapsed = 0;

  const STORAGE_KEY = 'emom_workouts';

  function parseExercises(){
    const lines = exercisesEl.value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    exercises = lines;
    return exercises;
  }

  function formatTimeSec(s){
    s = Math.max(0, Math.floor(Number(s) || 0));
    const mm = String(Math.floor(s/60)).padStart(2,'0');
    const ss = String(s % 60).padStart(2,'0');
    return mm + ':' + ss;
  }

  function updateDisplays(){
    // Show timer default when not running/paused
    if(!running && !paused){
      timerEl.textContent = formatTimeSec(Math.ceil(minuteMs/1000));
    } else {
      // when running or paused, timer updated via tick or pause shows current remaining
      // but ensure tick has been run at least once
    }

    const idx = (exercises.length ? getCurrentIndex() : -1);
    currentExerciseEl.textContent = (idx >= 0 ? exercises[idx] : '—');
    roundDisplayEl.textContent = `Round ${ getCurrentRound() } of ${ rounds }`;
    exerciseDisplayEl.textContent = `Exercise ${ (exercises.length ? (idx + 1) : 0) } of ${ exercises.length || 0 }`;
    totalTimeEl.textContent = `${ totalMinutes }m`;
  }

  function beep(){
    try{
      if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.value = 880;
      g.gain.value = 0.0001;
      o.connect(g);
      g.connect(audioCtx.destination);
      const now = audioCtx.currentTime;
      g.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
      o.start(now);
      g.gain.exponentialRampToValueAtTime(0.0001, now + 0.35);
      o.stop(now + 0.36);
    }catch(e){
      console.warn('beep failed', e);
    }
  }

  function tick(){
    const now = Date.now();
    let ms = Math.max(0, endTime - now);
    const secondsLeft = Math.ceil(ms / 1000);
    timerEl.textContent = formatTimeSec(secondsLeft);
    const elapsed = minuteMs - ms;
    const pct = Math.min(100, Math.max(0, (elapsed / minuteMs) * 100));
    progressBar.style.width = pct + '%';

    if(now >= endTime){
      // minute ended
      beep();
      minutesElapsed++;
      if(minutesElapsed >= totalMinutes){
        finish();
        return;
      } else {
        // schedule next minute and refresh displays to show next exercise
        endTime = Date.now() + minuteMs;
        updateDisplays();
      }
    }
  }

  function getCurrentIndex(){
    if(exercises.length === 0) return 0;
    // index is based on minutesElapsed (0-based)
    const idx = minutesElapsed % exercises.length;
    return idx;
  }
  function getCurrentRound(){
    if(exercises.length === 0) return 0;
    return Math.floor(minutesElapsed / exercises.length) + 1;
  }

  function start(){
    if(running) return;
    parseExercises();
    if(exercises.length === 0){
      alert('Please add at least one exercise (one per line).');
      return;
    }
    rounds = Math.max(1, parseInt(roundsEl.value) || 1);
    const dVal = Number(durationEl.value) || 60;
    minuteMs = Math.max(1, dVal) * 1000;

    // initialize counters
    running = true;
    paused = false;
    minutesElapsed = 0;
    totalMinutes = rounds * exercises.length;

    // hide setup inputs and panel
    setupPanel.classList.add('hidden');
    setupInputs.classList.add('hidden');

    // UI state
    statusEl.textContent = 'Running';
    startBtn.disabled = true;
    pauseBtn.disabled = false;
    resetBtn.disabled = false;

    // set first minute end
    endTime = Date.now() + minuteMs;
    progressBar.style.width = '0%';
    updateDisplays();

    if(intervalId) clearInterval(intervalId);
    intervalId = setInterval(tick, 200);
    tick();
  }

  function pause(){
    if(!running) return;
    if(paused){
      // resume
      paused = false;
      endTime = Date.now() + remainingMsOnPause;
      if(intervalId) clearInterval(intervalId);
      intervalId = setInterval(tick, 200);
      statusEl.textContent = 'Running';
      pauseBtn.textContent = 'Pause';
    } else {
      // pause
      paused = true;
      if(intervalId) clearInterval(intervalId);
      remainingMsOnPause = Math.max(0, endTime - Date.now());
      statusEl.textContent = 'Paused';
      pauseBtn.textContent = 'Resume';
      // show the paused remaining time
      timerEl.textContent = formatTimeSec(Math.ceil(remainingMsOnPause/1000));
    }
  }

  function reset(){
    // stop and reveal setup
    running = false;
    paused = false;
    if(intervalId) clearInterval(intervalId);
    intervalId = null;
    minutesElapsed = 0;
    parseExercises();
    minuteMs = Math.max(1, Number(durationEl.value) || 60) * 1000;
    totalMinutes = Math.max(1, (Number(roundsEl.value) || 1) * (exercises.length || 1));

    setupPanel.classList.remove('hidden');
    setupInputs.classList.remove('hidden');

    statusEl.textContent = 'Stopped';
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    pauseBtn.textContent = 'Pause';
    resetBtn.disabled = true;
    progressBar.style.width = '0%';
    updateDisplays();
  }

  function finish(){
    running = false;
    paused = false;
    if(intervalId) clearInterval(intervalId);
    intervalId = null;
    timerEl.textContent = formatTimeSec(0);
    statusEl.textContent = 'Completed!';
    currentExerciseEl.textContent = 'Done';
    progressBar.style.width = '100%';
    startBtn.disabled = false;
    pauseBtn.disabled = true;
    resetBtn.disabled = false;
    // reveal setup for next session
    setupPanel.classList.remove('hidden');
    setupInputs.classList.remove('hidden');
  }

  // Helpers / bindings
  pasteSample.addEventListener('click', () => {
    exercisesEl.value = 'Jumping Jacks\nPush-ups\nAir Squats\nPlank';
    parseExercises(); updateDisplays();
  });
  clearBtn.addEventListener('click', () => { exercisesEl.value = ''; parseExercises(); updateDisplays(); });

  startBtn.addEventListener('click', start);
  pauseBtn.addEventListener('click', pause);
  resetBtn.addEventListener('click', reset);

  // Update displays initially and on input changes
  updateDisplays();
  exercisesEl.addEventListener('input', () => { parseExercises(); updateDisplays(); });
  roundsEl.addEventListener('change', updateDisplays);
  durationEl.addEventListener('change', () => {
    const val = Number(durationEl.value) || 60;
    minuteMs = Math.max(1, val) * 1000;
    updateDisplays();
  });

  // Ctrl/Cmd+Enter to start from textarea
  exercisesEl.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && (e.ctrlKey || e.metaKey)){
      e.preventDefault(); start();
    }
  });

  // Storage helpers
  function getSavedWorkouts() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    } catch (e) {
      console.warn('bad saved data', e);
      return {};
    }
  }

  function persistSavedWorkouts(obj) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
  }

  function populateSavedList() {
    const data = getSavedWorkouts();
    const names = Object.keys(data).sort((a,b)=>a.localeCompare(b));
    savedSelect.innerHTML = '';
    if (names.length === 0) {
      const opt = document.createElement('option');
      opt.value = '';
      opt.textContent = 'No saved workouts';
      savedSelect.appendChild(opt);
      savedSelect.disabled = true;
      loadWorkoutBtn.disabled = true;
      deleteWorkoutBtn.disabled = true;
    } else {
      savedSelect.disabled = false;
      loadWorkoutBtn.disabled = false;
      deleteWorkoutBtn.disabled = false;
      names.forEach(name => {
        const opt = document.createElement('option');
        opt.value = name;
        const item = data[name];
        const count = (typeof item.exercises === 'string') ? item.exercises.split(/\r?\n/).filter(Boolean).length : 0;
        opt.textContent = name + ' — ' + count + ' ex • ' + (item.rounds||1) + ' r • ' + (item.duration||60) + ' s';
        savedSelect.appendChild(opt);
      });
    }
  }

  function saveWorkout(name) {
    if (!name || !name.trim()) { alert('Please enter a name to save.'); return; }
    const data = getSavedWorkouts();
    const normalized = name.trim();
    if (data[normalized]) {
      if (!confirm('A workout with that name exists. Overwrite?')) return;
    }
    data[normalized] = {
      exercises: exercisesEl.value,
      rounds: Number(roundsEl.value) || 1,
      duration: Number(durationEl.value) || 60,
      savedAt: Date.now()
    };
    persistSavedWorkouts(data);
    populateSavedList();
    // select newly saved
    savedSelect.value = normalized;
    saveNameEl.value = '';
  }

  function loadWorkoutByName(name) {
    const data = getSavedWorkouts();
    if (!name || !data[name]) { alert('Workout not found'); return; }
    const w = data[name];
    exercisesEl.value = w.exercises || '';
    roundsEl.value = w.rounds || 1;
    durationEl.value = w.duration || 60;
    parseExercises();
    updateDisplays();
  }

  function deleteWorkoutByName(name) {
    const data = getSavedWorkouts();
    if (!name || !data[name]) return;
    if (!confirm('Delete workout "' + name + '"?')) return;
    delete data[name];
    persistSavedWorkouts(data);
    populateSavedList();
  }

  // wire save/load/delete buttons
  saveWorkoutBtn.addEventListener('click', () => saveWorkout(saveNameEl.value));
  loadWorkoutBtn.addEventListener('click', () => {
    const name = savedSelect.value;
    if (!name) { alert('Select a workout to load'); return; }
    loadWorkoutByName(name);
  });
  deleteWorkoutBtn.addEventListener('click', () => {
    const name = savedSelect.value;
    if (!name) { alert('Select a workout to delete'); return; }
    deleteWorkoutByName(name);
  });

  // populate on load
  populateSavedList();

  // Optional: scroll focused input into view on mobile (helps when keyboard opens)
  ['focus','click'].forEach(ev => {
    document.addEventListener(ev, (e) => {
      const target = e.target;
      if (target && (target.tagName === 'TEXTAREA' || target.tagName === 'INPUT')) {
        // slight delay so mobile keyboard begins to open then scroll
        setTimeout(() => {
          target.scrollIntoView({block:'center', behavior:'smooth'});
        }, 250);
      }
    }, true);
  });

})();
</script>
</body>
</html>
